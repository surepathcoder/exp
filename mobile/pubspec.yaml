name: expense_tracker
description: A complete production-ready expense tracker app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  image_picker: ^1.0.7
  equatable: ^2.0.5
  go_router: ^13.1.0
  flutter_svg: ^2.0.9
  flutter_secure_storage: ^9.0.0
  fl_chart: ^0.66.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
